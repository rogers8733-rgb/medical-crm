
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:20px;max-width:600px;}
.btn{display:block;width:100%;padding:18px;margin:10px 0;font-size:20px;border-radius:10px;text-align:center;background:#1976d2;color:white;text-decoration:none;}
input,select,textarea{width:100%;padding:12px;margin:8px 0;font-size:16px;}
</style>

<script>
function getLocation(){
navigator.geolocation.getCurrentPosition(function(pos){
document.getElementById("loc").innerText="Lat: "+pos.coords.latitude+" Lon: "+pos.coords.longitude;
});
}
</script>
</head>
<body onload="getLocation()">
<a href="/">Home</a>
<h2>Offices Near Me</h2>
<p id="loc">Finding location...</p>
<ul>
{% for o in offices %}
<li>{{o[0]}}</li>
{% endfor %}
</ul>
</body>
</html>
