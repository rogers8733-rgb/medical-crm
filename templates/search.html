
<html><head>
<style>
body{font-family:Arial;margin:20px;max-width:650px;}
.btn{display:block;width:100%;padding:18px;margin:10px 0;font-size:20px;border-radius:10px;background:#1976d2;color:white;text-align:center;text-decoration:none;}
input,select,textarea{width:100%;padding:12px;margin:8px 0;font-size:16px;}
.card{border:1px solid #ddd;padding:15px;margin-bottom:12px;border-radius:8px;}
</style>
</head>
<body>
<a href="/">Home</a>
<h2>Search Results</h2>

{% for r in results %}
<div class="card">
<b>{{r[0]}}</b>
<a class="btn" href="/office/{{r[0]}}">Open</a>
</div>
{% endfor %}

</body></html>
