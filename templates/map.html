
<html><head>
<style>

.btn{display:block;width:100%;padding:16px;margin:8px 0;font-size:18px;border-radius:10px;background:#1976d2;color:white;text-align:center;text-decoration:none;}

.card{border:1px solid #ddd;padding:12px;margin-bottom:10px;border-radius:8px;}
</style>
</head>
<body>

<a href="/">Home</a>

{{o[6]}}

Open in Google Maps
</a>

</div>
{% endfor %}

</body></html>
