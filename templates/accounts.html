
{% extends "base.html" %}
{% block content %}

<h2>Accounts</h2>

{% for a in accounts %}

<div class="card">

<b>{{a[1]}}</b><br>
{{a[2]}} {{a[3]}}<br>

Active: {{a[7]}}

<a class="btn" href="/visit/{{a[0]}}">Log Visit</a>

<form action="/referral/{{a[0]}}" method="post">

<input name="patient" placeholder="Patient">

<select name="category">
<option>Complex Power</option>
<option>Complex Manual</option>
<option>Basic Power</option>
<option>Scooter</option>
</select>

<select name="status">
<option>Evaluation</option>
<option>Order</option>
<option>Delivered</option>
</select>

<button class="btn">Add Referral</button>

</form>

</div>

{% endfor %}

{% endblock %}
