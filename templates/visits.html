
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log Visit</title>
</head>

<body style="font-family:Arial;padding:20px;">

<a href="/">⬅ Home</a>

<h2>Log Visit</h2>

<input id="search" placeholder="Search office..." style="width:100%;padding:10px;margin-bottom:10px;">

<form method="POST">

<select name="office" id="office" style="width:100%;padding:10px;">
{% for o in offices %}
<option>{{o[0]}}</option>
{% endfor %}
</select><br><br>

Notes<br>
<textarea name="note" style="width:100%;padding:10px;"></textarea><br><br>

<button style="padding:14px;">Save Visit</button>

</form>

<script>
document.getElementById("search").addEventListener("keyup", function(){
var filter=this.value.toLowerCase();
var options=document.getElementById("office").options;
for(let i=0;i<options.length;i++){
var txt=options[i].text.toLowerCase();
options[i].style.display=txt.includes(filter)?"":"none";
}
});
</script>

</body>
</html>
