
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/mobile_ui.css">
</head>
<body>

<h1>CRM Dashboard</h1>

<form method="get">
<input name="search" placeholder="Search account or city" value="{{search}}">
<button type="submit">Search</button>
</form>

<a href="/accounts"><button>Accounts</button></a>
<a href="/add_account"><button>Add Account</button></a>
<a href="/import"><button>Import Accounts</button></a>
<a href="/log_referral"><button>Log Referral</button></a>
<a href="/log_visit"><button>Log Visit</button></a>

<h2>Accounts</h2>
<table>
<tr><th>Name</th><th>City</th><th>Class</th></tr>
{% for a in accounts %}
<tr><td>{{a.name}}</td><td>{{a.city}}</td><td>{{a.classification}}</td></tr>
{% endfor %}
</table>
