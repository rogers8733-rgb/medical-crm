
<!DOCTYPE html>
<html>
<head>
<title>Territory CRM</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Territory CRM</h1>

<form method="get">
<input name="search" placeholder="Search office, MD, coordinator" value="{{search}}">
<button type="submit">Search</button>
</form>

<a href="/add">Add Account</a> |
<a href="/import">Import Excel</a>

<h2>Follow Ups Due</h2>

<table>
<tr><th>Office</th><th>Next Follow Up</th></tr>

{% for f in followups %}
<tr>
<td>{{f[1]}}</td>
<td>{{f[7]}}</td>
</tr>
{% endfor %}

</table>

<h2>Accounts</h2>

<table>

<tr>
<th>Office</th>
<th>MD</th>
<th>Class</th>
<th>Last Visit</th>
<th>Next Follow Up</th>
<th>Actions</th>
</tr>

{% for a in accounts %}

<tr class="priority-{{a[5]}}">

<td>{{a[1]}}</td>
<td>{{a[2]}}</td>
<td>{{a[5]}}</td>
<td>{{a[6]}}</td>
<td>{{a[7]}}</td>

<td>
<a href="/visit/{{a[0]}}">Visit</a>
<a href="/referral/{{a[0]}}">Referral</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
