
<html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:20px;max-width:600px;}
.btn{display:block;width:100%;padding:18px;margin:10px 0;font-size:20px;border-radius:10px;text-align:center;background:#1976d2;color:white;text-decoration:none;}
input,select,textarea{width:100%;padding:12px;margin:8px 0;font-size:16px;}
</style>
</head>
<body>
<a href="/">Home</a>
<h2>Log Referral</h2>
<form method="POST">
<select name="office">
{% for o in offices %}
<option>{{o[0]}}</option>
{% endfor %}
</select>
<input name="rtype" placeholder="Referral Type">
<textarea name="notes" placeholder="Notes"></textarea>
<button class="btn">Save Referral</button>
</form>
</body></html>
