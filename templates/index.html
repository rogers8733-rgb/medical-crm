
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marketing CRM</title>
<style>
body{font-family:Arial;background:#eef1f5;margin:0}
.header{background:#1f2937;color:white;padding:18px;text-align:center;font-size:24px}
.container{padding:16px}
.button{display:block;width:100%;background:#2563eb;color:white;padding:16px;border-radius:12px;text-align:center;text-decoration:none;font-size:20px;margin-bottom:12px}
.card{background:white;padding:16px;border-radius:10px;margin-bottom:14px}
</style>
</head>

<body>

<div class="header">Marketing CRM</div>

<div class="container">

<a class="button" href="/visits">Log Visit</a>
<a class="button" href="/referral">Log Referral</a>
<a class="button" href="/planner">Where Should I Go This Week?</a>

<div class="card">
<h3>Top Referral Sources</h3>
<ul>
{% for o in leaderboard %}
<li>{{o[0]}} — {{o[1]}} referrals</li>
{% endfor %}
</ul>
</div>

</div>

</body>
</html>
