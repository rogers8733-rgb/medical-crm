
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Office</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
input,select,textarea{
width:100%;
padding:16px;
font-size:20px;
margin-bottom:16px;
}
button{
width:100%;
padding:18px;
font-size:22px;
background:#2563eb;
color:white;
border:none;
}
</style>
</head>

<body>

<a href="/">⬅ Home</a>

<h1>Add Office</h1>

<form method="POST">

<input name="phone">

Class

Notes

<button>Save Office</button>

</html>
