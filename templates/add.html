
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Office</title>

<style>
body{font-family:Arial;margin:0;background:#eef1f5;padding:20px;}
h1{text-align:center;}
input,select,textarea{
width:100%;
padding:14px;
font-size:18px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #ccc;
}
button{
width:100%;
padding:16px;
font-size:20px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Add Office</h1>

<form method="POST">

Office
<input name="office">

MD
<input name="md">

Phone
<input name="phone">

Address
<input name="address">

Class
<select name="classification">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

Notes
<textarea name="notes"></textarea>

<button>Save Office</button>

</form>

</body>
</html>
