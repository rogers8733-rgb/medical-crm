
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Referral</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
select,button{
width:100%;
padding:16px;
font-size:20px;
margin-bottom:14px;
border-radius:10px;
}
button{
background:#2563eb;
color:white;
border:none;
}
</style>
</head>

<body>

<h1>Quick Referral</h1>

<form method="POST">

Office
<select name="office">
{% for o in offices %}
<option>{{o[0]}}</option>
{% endfor %}
</select>

Referral Type
<select name="rtype">
<option>Group 3 Power Chair</option>
<option>Group 2 Power Chair</option>
<option>Scooter</option>
<option>Custom Manual</option>
<option>Ultralight Manual</option>
<option>Seating Evaluation</option>
</select>

<button>Log Referral</button>

</form>

</body>
</html>
